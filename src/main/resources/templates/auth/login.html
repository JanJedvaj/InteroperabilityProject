<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Books</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          crossorigin="anonymous"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          crossorigin="anonymous"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-logo">
            <span class="logo-icon">📚</span>
            <h1>Books</h1>
            <p>Interoperability Platform</p>
        </div>

        <!-- Error message -->
        <div class="alert alert-danger d-flex align-items-center gap-2 mb-3"
             th:if="${param.error}">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span>Invalid username or password. Please try again.</span>
        </div>

        <!-- Logout message -->
        <div class="alert alert-success d-flex align-items-center gap-2 mb-3"
             th:if="${param.logout}">
            <i class="bi bi-check-circle-fill"></i>
            <span>You have been logged out successfully.</span>
        </div>

        <form th:action="@{/login}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label for="username" class="form-label">
                    <i class="bi bi-person me-1"></i>Username
                </label>
                <input id="username" name="username" type="text"
                       class="form-control" placeholder="Enter username"
                       autocomplete="username" autofocus required/>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label">
                    <i class="bi bi-lock me-1"></i>Password
                </label>
                <input id="password" name="password" type="password"
                       class="form-control" placeholder="Enter password"
                       autocomplete="current-password" required/>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
            </button>
        </form>

        <hr class="my-4"/>

        <div class="text-center text-muted" style="font-size:.78rem;">
            <p class="mb-1">
                <span class="badge bg-success me-1">FULL</span>
                <strong>admin</strong> — full read/write access
            </p>
            <p class="mb-0">
                <span class="badge bg-primary me-1">READ</span>
                <strong>reader</strong> — read-only access
            </p>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
</body>
</html>
