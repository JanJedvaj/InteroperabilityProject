<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{layout/layout :: head('Settings')}"></head>
<body>

<nav th:replace="~{layout/layout :: nav}"></nav>

<div class="container-xl main-content">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="page-header">
        <h1><i class="bi bi-gear me-2 text-primary"></i>Settings</h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between">
                    <span><i class="bi bi-arrow-left-right me-2"></i>API Source</span>
                    <span th:class="${currentMode == 'CUSTOM'} ? 'mode-badge mode-custom' : 'mode-badge mode-public'">
                        <i th:class="${currentMode == 'CUSTOM'} ? 'bi bi-database' : 'bi bi-cloud'"></i>
                        <span th:text="${currentMode == 'CUSTOM'} ? 'Custom DB' : 'Public API'">Mode</span>
                    </span>
                </div>
                <div class="card-body">
                    <p class="text-muted mb-4" style="font-size:.875rem;">
                        Choose which data source the application uses for all Books operations.
                        The switch takes effect immediately — no restart required.
                    </p>

                    <form th:action="@{/settings}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="d-flex flex-column gap-3 mb-4">

                            <!-- CUSTOM option -->
                            <label class="mode-option">
                                <input type="radio" name="mode" value="CUSTOM"
                                       th:checked="${currentMode == 'CUSTOM'}"/>
                                <div>
                                    <div class="mode-label">
                                        <i class="bi bi-database me-1 text-primary"></i>Custom (Local Database)
                                    </div>
                                    <div class="mode-desc">
                                        Uses the local Microsoft SQL Server database managed by this application.
                                        All CRUD operations are persisted locally.
                                    </div>
                                </div>
                            </label>

                            <!-- PUBLIC option -->
                            <label class="mode-option">
                                <input type="radio" name="mode" value="PUBLIC"
                                       th:checked="${currentMode == 'PUBLIC'}"/>
                                <div>
                                    <div class="mode-label">
                                        <i class="bi bi-cloud me-1 text-success"></i>Public (FakeRESTAPI)
                                    </div>
                                    <div class="mode-desc">
                                        Proxies all requests to
                                        <code>https://fakerestapi.azurewebsites.net/api/v1/Books</code>.
                                        Write operations are forwarded but not durably stored remotely.
                                    </div>
                                </div>
                            </label>

                        </div>

                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>Apply
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Info box -->
            <div class="alert alert-info mt-3">
                <i class="bi bi-info-circle me-2"></i>
                <strong>Note:</strong> Only users with the <strong>FULL</strong> role can change this setting.
                The current active mode is shown in the dashboard and the Books list.
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/layout :: scripts}"></div>
</body>
</html>
