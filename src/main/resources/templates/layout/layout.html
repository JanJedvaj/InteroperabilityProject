<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Books'">Books</title>

    <!-- Bootstrap 5.3 CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          crossorigin="anonymous"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          crossorigin="anonymous"/>
    <!-- App custom CSS -->
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>

<body>

<!-- ════════════════ NAVBAR FRAGMENT ════════════════ -->
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-app">
    <div class="container-xl">

        <!-- Brand -->
        <a class="navbar-brand" th:href="@{/home}">📚 Books</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <!-- Left nav links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">
                        <i class="bi bi-house-door me-1"></i>Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}">
                        <i class="bi bi-book me-1"></i>Books
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/soap-search}">
                        <i class="bi bi-search me-1"></i>SOAP Search
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/validation}">
                        <i class="bi bi-shield-check me-1"></i>XML Validate
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/weather}">
                        <i class="bi bi-cloud-sun me-1"></i>Weather
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/graphql-ui}">
                        <i class="bi bi-braces me-1"></i>GraphQL
                    </a>
                </li>

                <!-- FULL role only -->
                <li class="nav-item" sec:authorize="hasRole('FULL')">
                    <a class="nav-link" th:href="@{/import}">
                        <i class="bi bi-upload me-1"></i>Import
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('FULL')">
                    <a class="nav-link" th:href="@{/settings}">
                        <i class="bi bi-gear me-1"></i>Settings
                    </a>
                </li>

            </ul>

            <!-- Right side: user info + logout -->
            <div class="d-flex align-items-center gap-2">
                <span class="badge-user-name">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name">User</span>
                </span>

                <span class="badge rounded-pill badge-role-full"
                      sec:authorize="hasRole('FULL')">FULL</span>
                <span class="badge rounded-pill badge-role-read"
                      sec:authorize="!hasRole('FULL') and isAuthenticated()">READ</span>

                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-outline-light ms-1">
                        <i class="bi bi-box-arrow-right me-1"></i>Logout
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
<!-- ════════════════ /NAVBAR FRAGMENT ════════════════ -->


<!-- ════════════════ SCRIPTS FRAGMENT ════════════════ -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
</div>
<!-- ════════════════ /SCRIPTS FRAGMENT ════════════════ -->

</body>
</html>
