<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{layout/layout :: head(${editMode} ? 'Edit Book' : 'Create Book')}"></head>
<body>

<nav th:replace="~{layout/layout :: nav}"></nav>

<div class="container-xl main-content">

    <div class="page-header">
        <h1>
            <i class="bi bi-pencil-square me-2 text-primary" th:if="${editMode}"></i>
            <i class="bi bi-plus-circle me-2 text-primary" th:unless="${editMode}"></i>
            <span th:text="${editMode} ? 'Edit Book' : 'Create Book'">Book</span>
        </h1>
        <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left me-1"></i>Back to Books
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">
                    <form th:action="${editMode} ? @{/books/{id}(id=${bookForm.id})} : @{/books}"
                          th:object="${bookForm}"
                          method="post" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="row g-3">

                            <!-- Title -->
                            <div class="col-12">
                                <label for="title" class="form-label">
                                    Title <span class="text-danger">*</span>
                                </label>
                                <input id="title" type="text" th:field="*{title}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                                       placeholder="Enter book title" required/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}"
                                     th:errors="*{title}"></div>
                            </div>

                            <!-- Description -->
                            <div class="col-12">
                                <label for="description" class="form-label">Description</label>
                                <textarea id="description" th:field="*{description}"
                                          class="form-control" rows="3"
                                          placeholder="Enter book description"></textarea>
                            </div>

                            <!-- Page Count -->
                            <div class="col-sm-6">
                                <label for="pageCount" class="form-label">
                                    Page Count <span class="text-danger">*</span>
                                </label>
                                <input id="pageCount" type="number" th:field="*{pageCount}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('pageCount')} ? 'is-invalid'"
                                       min="1" placeholder="e.g. 320" required/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('pageCount')}"
                                     th:errors="*{pageCount}"></div>
                            </div>

                            <!-- Publish Date -->
                            <div class="col-sm-6">
                                <label for="publishDate" class="form-label">Publish Date</label>
                                <input id="publishDate" type="datetime-local"
                                       th:field="*{publishDate}"
                                       class="form-control"/>
                                <div class="form-text text-muted">Format: YYYY-MM-DDTHH:MM</div>
                            </div>

                            <!-- Excerpt -->
                            <div class="col-12">
                                <label for="excerpt" class="form-label">Excerpt</label>
                                <textarea id="excerpt" th:field="*{excerpt}"
                                          class="form-control" rows="4"
                                          placeholder="Short excerpt from the book"></textarea>
                            </div>

                        </div>

                        <hr class="my-4"/>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/books}" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-1"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${editMode} ? 'Save Changes' : 'Create Book'">Save</span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/layout :: scripts}"></div>
</body>
</html>
