<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{layout/layout :: head('Books')}"></head>
<body>

<nav th:replace="~{layout/layout :: nav}"></nav>

<div class="container-xl main-content">

    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Page header -->
    <div class="page-header">
        <div class="d-flex align-items-center gap-3">
            <h1><i class="bi bi-book me-2 text-primary"></i>Books</h1>
            <span th:class="${currentMode == 'CUSTOM'} ? 'mode-badge mode-custom' : 'mode-badge mode-public'">
                <i th:class="${currentMode == 'CUSTOM'} ? 'bi bi-database' : 'bi bi-cloud'"></i>
                <span th:text="${currentMode == 'CUSTOM'} ? 'Custom DB' : 'Public API'">Mode</span>
            </span>
        </div>

        <div class="d-flex align-items-center gap-2 flex-wrap">
            <!-- Search -->
            <form th:action="@{/books}" method="get" class="d-flex search-group">
                <input type="text" name="term" class="form-control form-control-sm"
                       placeholder="Search title / description…"
                       th:value="${term}"/>
                <button type="submit" class="btn btn-sm btn-outline-primary ms-1">
                    <i class="bi bi-search"></i>
                </button>
                <a th:if="${term != null and !term.isEmpty()}" th:href="@{/books}"
                   class="btn btn-sm btn-outline-secondary ms-1" title="Clear">
                    <i class="bi bi-x-lg"></i>
                </a>
            </form>

            <!-- Add button (FULL only) -->
            <a th:href="@{/books/new}" class="btn btn-primary btn-sm"
               sec:authorize="hasRole('FULL')">
                <i class="bi bi-plus-lg me-1"></i>Add Book
            </a>
        </div>
    </div>

    <!-- Results info when searching -->
    <p th:if="${term != null and !term.isEmpty()}" class="text-muted mb-2" style="font-size:.85rem;">
        <i class="bi bi-search me-1"></i>
        Showing results for <strong th:text="${term}"></strong> —
        <span th:text="${books.size()}">0</span> found.
        <a th:href="@{/books}">Clear</a>
    </p>

    <!-- Table -->
    <div class="table-wrapper" th:if="${!books.isEmpty()}">
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th style="width:60px;">#</th>
                <th>Title</th>
                <th style="width:120px;">Pages</th>
                <th style="width:170px;">Publish Date</th>
                <th style="width:140px;" class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td class="text-muted" th:text="${book.id()}">1</td>
                <td>
                    <a th:href="@{/books/{id}(id=${book.id()})}"
                       class="fw-medium text-decoration-none"
                       th:text="${book.title()}">Title</a>
                    <div class="text-muted text-truncate" style="max-width:400px; font-size:.78rem;"
                         th:if="${book.description() != null and !book.description().isEmpty()}"
                         th:text="${book.description()}"></div>
                </td>
                <td th:text="${book.pageCount()}">0</td>
                <td style="font-size:.82rem;" th:text="${book.publishDate() != null ? #temporals.format(book.publishDate(), 'dd MMM yyyy') : '—'}">—</td>
                <td class="text-end">
                    <a th:href="@{/books/{id}(id=${book.id()})}"
                       class="btn btn-sm btn-outline-secondary me-1" title="View">
                        <i class="bi bi-eye"></i>
                    </a>
                    <a th:href="@{/books/{id}/edit(id=${book.id()})}"
                       class="btn btn-sm btn-outline-primary me-1" title="Edit"
                       sec:authorize="hasRole('FULL')">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/books/{id}/delete(id=${book.id()})}" method="post"
                          class="d-inline"
                          sec:authorize="hasRole('FULL')"
                          onsubmit="return confirm('Delete this book?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty state -->
    <div class="empty-state" th:if="${books.isEmpty()}">
        <span class="empty-icon">📭</span>
        <p th:if="${term != null and !term.isEmpty()}">
            No books found matching <strong th:text="${term}"></strong>.
        </p>
        <p th:if="${term == null or term.isEmpty()}">
            No books yet.
            <a th:href="@{/books/new}" sec:authorize="hasRole('FULL')">Add the first one!</a>
        </p>
    </div>

</div>

<div th:replace="~{layout/layout :: scripts}"></div>
</body>
</html>
