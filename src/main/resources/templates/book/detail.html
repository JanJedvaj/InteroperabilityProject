<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{layout/layout :: head(${book.title()})}"></head>
<body>

<nav th:replace="~{layout/layout :: nav}"></nav>

<div class="container-xl main-content">

    <div class="page-header">
        <h1>
            <i class="bi bi-book-open me-2 text-primary"></i>
            <span th:text="${book.title()}">Book Title</span>
        </h1>
        <div class="d-flex gap-2">
            <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <a th:href="@{/books/{id}/edit(id=${book.id()})}"
               class="btn btn-primary btn-sm"
               sec:authorize="hasRole('FULL')">
                <i class="bi bi-pencil me-1"></i>Edit
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-body">

                    <div class="row g-4">
                        <!-- ID -->
                        <div class="col-sm-6">
                            <div class="text-muted" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;">
                                Book ID
                            </div>
                            <div class="fw-semibold mt-1" th:text="${book.id()}">—</div>
                        </div>

                        <!-- Page Count -->
                        <div class="col-sm-6">
                            <div class="text-muted" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;">
                                Pages
                            </div>
                            <div class="fw-semibold mt-1" th:text="${book.pageCount()}">—</div>
                        </div>

                        <!-- Publish Date -->
                        <div class="col-sm-6">
                            <div class="text-muted" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;">
                                Publish Date
                            </div>
                            <div class="fw-semibold mt-1"
                                 th:text="${book.publishDate() != null ? #temporals.format(book.publishDate(), 'dd MMMM yyyy, HH:mm') : '—'}">—</div>
                        </div>

                        <!-- Title -->
                        <div class="col-12">
                            <div class="text-muted" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;">
                                Title
                            </div>
                            <div class="fw-semibold mt-1 fs-5" th:text="${book.title()}">—</div>
                        </div>

                        <!-- Description -->
                        <div class="col-12" th:if="${book.description() != null and !book.description().isEmpty()}">
                            <div class="text-muted" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;">
                                Description
                            </div>
                            <p class="mt-1 mb-0" style="line-height:1.7;" th:text="${book.description()}"></p>
                        </div>

                        <!-- Excerpt -->
                        <div class="col-12" th:if="${book.excerpt() != null and !book.excerpt().isEmpty()}">
                            <div class="text-muted" style="font-size:.75rem; text-transform:uppercase; letter-spacing:.06em; font-weight:600;">
                                Excerpt
                            </div>
                            <blockquote class="blockquote mt-1 ps-3" style="border-left:3px solid var(--primary); font-size:.9rem;">
                                <p class="mb-0 fst-italic text-muted" th:text="${book.excerpt()}"></p>
                            </blockquote>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{layout/layout :: scripts}"></div>
</body>
</html>
