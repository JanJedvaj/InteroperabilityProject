<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head th:replace="~{layout/layout :: head('SOAP Search')}"></head>
<body>

<nav th:replace="~{layout/layout :: nav}"></nav>

<div class="container-xl main-content">

    <div class="page-header">
        <h1><i class="bi bi-search me-2 text-primary"></i>SOAP / XPath Search</h1>
    </div>

    <!-- Explanation -->
    <div class="alert alert-info mb-4">
        <i class="bi bi-info-circle me-2"></i>
        Books are serialized to an in-memory XML document, then filtered using
        <strong>XPath 1.0</strong> with Croatian-aware case folding (<code>translate()</code>).
        Matches on <em>title</em> or <em>description</em>.
    </div>

    <!-- Search form -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/soap-search}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="row g-2 align-items-end">
                    <div class="col">
                        <label for="term" class="form-label">Search term</label>
                        <input id="term" type="text" name="term"
                               class="form-control"
                               placeholder="e.g. dragon, adventure, …"
                               th:value="${term}"/>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-search me-1"></i>Search
                        </button>
                    </div>
                    <div class="col-auto" th:if="${term != null and !term.isEmpty()}">
                        <a th:href="@{/soap-search}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> Clear
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Results when searched -->
    <div th:if="${results != null}">

        <div class="d-flex align-items-center justify-content-between mb-2" th:if="${!results.isEmpty()}">
            <p class="text-muted mb-0" style="font-size:.875rem;">
                <i class="bi bi-filter me-1"></i>
                <span th:text="${results.size()}">0</span> result(s) for
                <strong th:text="${term}"></strong>
            </p>
        </div>

        <!-- Results table -->
        <div class="table-wrapper" th:if="${!results.isEmpty()}">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th style="width:60px;">#</th>
                    <th>Title</th>
                    <th style="width:120px;">Pages</th>
                    <th style="width:170px;">Publish Date</th>
                    <th style="width:80px;" class="text-end">View</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${results}">
                    <td class="text-muted" th:text="${book.id()}">—</td>
                    <td>
                        <div class="fw-medium" th:text="${book.title()}">Title</div>
                        <div class="text-muted text-truncate" style="max-width:420px; font-size:.78rem;"
                             th:if="${book.description() != null and !book.description().isEmpty()}"
                             th:text="${book.description()}"></div>
                    </td>
                    <td th:text="${book.pageCount()}">0</td>
                    <td style="font-size:.82rem;"
                        th:text="${book.publishDate() != null ? #temporals.format(book.publishDate(), 'dd MMM yyyy') : '—'}">—</td>
                    <td class="text-end">
                        <a th:href="@{/books/{id}(id=${book.id()})}"
                           class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-eye"></i>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Empty state -->
        <div class="empty-state" th:if="${results.isEmpty()}">
            <span class="empty-icon">🔍</span>
            <p>No books found matching <strong th:text="${term}"></strong>.</p>
        </div>
    </div>

</div>

<div th:replace="~{layout/layout :: scripts}"></div>
</body>
</html>
